esphome:
  includes:
    - <algorithm>
    - <cerrno>
    - <memory>
    - <span>
    - <string>
    - <vector>
    - <esphome/components/binary_sensor/binary_sensor.h>
    - <esphome/components/network/util.h>
    - <esphome/components/socket/socket.h>
    - <esphome/components/text_sensor/text_sensor.h>
    - <esphome/components/uart/uart_component.h>
    - <esphome/core/log.h>
    - <esphome/core/version.h>
  on_loop:
    - lambda: |-
        using esphome::binary_sensor::BinarySensor;
        using esphome::socket::Socket;
        using esphome::text_sensor::TextSensor;
        using esphome::uart::UARTComponent;
        using esphome::uart::UARTDirection;
        using esphome::uart::UART_DIRECTION_RX;
        using esphome::uart::UART_DIRECTION_TX;

        class DuepiExpertTcpBridge {
         public:
          DuepiExpertTcpBridge(UARTComponent *uart, TextSensor *debug, TextSensor *debug_tx, TextSensor *debug_rx,
                               BinarySensor *connected_sensor, int *uart_send, bool *connected_flag,
                               bool *takeover_active_flag)
              : uart_(uart),
                debug_(debug),
                debug_tx_(debug_tx),
                debug_rx_(debug_rx),
                connected_sensor_(connected_sensor),
                uart_send_(uart_send),
                connected_flag_(connected_flag),
                takeover_active_flag_(takeover_active_flag) {
                this->uart_->add_debug_callback([this](UARTDirection direction, uint8_t byte) { this->on_uart_byte_(direction, byte); });
              }

          void set_enabled(bool enabled) {
            if (this->enabled_ == enabled) {
              return;
            }
            this->enabled_ = enabled;
            if (!enabled) {
              this->publish_takeover_active_(false);
              this->close_client_("Official app compatibility disabled");
              this->close_listener_();
            } else {
              this->next_listener_retry_ms_ = 0;
            }
          }

          bool is_connected() const { return this->client_socket_ != nullptr; }

          void loop() {
            if (!esphome::network::is_connected()) {
              if (this->listener_socket_ != nullptr || this->client_socket_ != nullptr) {
                this->close_client_("Official app compatibility network down");
                this->close_listener_();
              }
              return;
            }

            if (!this->enabled_) {
              return;
            }

            this->ensure_listener_();
            if (this->listener_socket_ == nullptr) {
              return;
            }

            this->accept_client_();

            if (this->client_socket_ == nullptr) {
              return;
            }

            if (!this->takeover_ready_) {
              if (*this->uart_send_ == 0) {
                this->takeover_ready_ = true;
                this->publish_takeover_active_(true);
                this->publish_debug_("Official app compatibility ready on port " + std::to_string(this->port_));
              }
              return;
            }

            this->flush_uart_rx_to_client_();
            this->read_client_to_uart_();
          }

         private:
              UARTComponent *uart_;
          TextSensor *debug_;
          TextSensor *debug_tx_;
          TextSensor *debug_rx_;
          BinarySensor *connected_sensor_;
          int *uart_send_;
          bool *connected_flag_;
          bool *takeover_active_flag_;

          uint16_t port_{2000};
          bool enabled_{false};
          bool takeover_ready_{false};
          uint32_t next_listener_retry_ms_{0};

          std::unique_ptr<Socket> listener_socket_{nullptr};
          std::unique_ptr<Socket> client_socket_{nullptr};
          std::string client_identifier_{};
          std::vector<uint8_t> pending_rx_bytes_{};
          size_t pending_rx_offset_{0};
          std::string tx_frame_buffer_{};
          std::string rx_frame_buffer_{};

          void publish_debug_(const std::string &message) {
            ESP_LOGD("duepi_expert_tcp", "%s", message.c_str());
            this->debug_->publish_state(message);
          }

          void publish_connected_(bool connected) {
            *this->connected_flag_ = connected;
            this->connected_sensor_->publish_state(connected);
          }

          void publish_takeover_active_(bool active) { *this->takeover_active_flag_ = active; }

          void ensure_listener_() {
            if (this->listener_socket_ != nullptr) {
              return;
            }
            if (this->next_listener_retry_ms_ != 0 && millis() < this->next_listener_retry_ms_) {
              return;
            }

            auto listener = esphome::socket::socket_ip_loop_monitored(SOCK_STREAM, 0);
            if (listener == nullptr) {
              this->publish_debug_("Official app compatibility failed to create TCP socket");
              this->next_listener_retry_ms_ = millis() + 5000;
              return;
            }

            int enable = 1;
            int err = listener->setsockopt(SOL_SOCKET, SO_REUSEADDR, &enable, sizeof(enable));
            if (err != 0) {
              ESP_LOGW("duepi_expert_tcp", "Failed to set SO_REUSEADDR: %d", err);
            }

            err = listener->setblocking(false);
            if (err != 0) {
              this->publish_debug_("Official app compatibility failed to set nonblocking listener");
              listener->close();
              this->next_listener_retry_ms_ = millis() + 5000;
              return;
            }

            struct sockaddr_storage bind_addr;
            socklen_t bind_len =
                esphome::socket::set_sockaddr_any(reinterpret_cast<struct sockaddr *>(&bind_addr), sizeof(bind_addr), this->port_);
            if (bind_len == 0) {
              this->publish_debug_("Official app compatibility failed to prepare bind address");
              listener->close();
              this->next_listener_retry_ms_ = millis() + 5000;
              return;
            }

            err = listener->bind(reinterpret_cast<struct sockaddr *>(&bind_addr), bind_len);
            if (err != 0) {
              this->publish_debug_("Official app compatibility bind failed on port " + std::to_string(this->port_));
              listener->close();
              this->next_listener_retry_ms_ = millis() + 5000;
              return;
            }

            err = listener->listen(1);
            if (err != 0) {
              this->publish_debug_("Official app compatibility listen failed on port " + std::to_string(this->port_));
              listener->close();
              this->next_listener_retry_ms_ = millis() + 5000;
              return;
            }

            this->listener_socket_ = std::move(listener);
            this->next_listener_retry_ms_ = 0;
            this->publish_debug_("Official app compatibility listening on port " + std::to_string(this->port_));
          }

          void close_listener_() {
            if (this->listener_socket_ != nullptr) {
              this->listener_socket_->close();
              this->listener_socket_.reset();
            }
          }

          void reset_session_buffers_() {
            this->pending_rx_bytes_.clear();
            this->pending_rx_offset_ = 0;
            this->tx_frame_buffer_.clear();
            this->rx_frame_buffer_.clear();
          }

          void close_client_(const std::string &reason) {
            if (this->client_socket_ != nullptr) {
              this->client_socket_->shutdown(SHUT_RDWR);
              this->client_socket_->close();
              this->client_socket_.reset();
            }
            this->takeover_ready_ = false;
            this->client_identifier_.clear();
            this->reset_session_buffers_();
            this->publish_connected_(false);
            this->publish_takeover_active_(false);
            if (!reason.empty()) {
              this->publish_debug_(reason);
            }
          }

          void accept_client_() {
            if (this->listener_socket_ == nullptr || !this->listener_socket_->ready()) {
              return;
            }

            while (true) {
              struct sockaddr_storage client_addr;
              socklen_t client_len = sizeof(client_addr);
              auto socket =
                  this->listener_socket_->accept_loop_monitored(reinterpret_cast<struct sockaddr *>(&client_addr), &client_len);
              if (!socket) {
                break;
              }

              socket->setblocking(false);
              #if ESPHOME_VERSION_CODE >= VERSION_CODE(2026, 1, 0)
              std::string identifier = std::string{esphome::socket::SOCKADDR_STR_LEN, 0};
              auto identifier_span =
                  std::span<char, esphome::socket::SOCKADDR_STR_LEN>(identifier.data(), identifier.size());
              identifier.resize(socket->getpeername_to(identifier_span));
              #else
              std::string identifier = socket->getpeername();
              #endif

              if (this->client_socket_ != nullptr) {
                socket->shutdown(SHUT_RDWR);
                socket->close();
                this->publish_debug_("Official app compatibility refused second client " + identifier);
                continue;
              }

              this->client_socket_ = std::move(socket);
              this->client_identifier_ = identifier;
              this->takeover_ready_ = (*this->uart_send_ == 0);
              this->reset_session_buffers_();
              this->publish_connected_(true);
              this->publish_takeover_active_(this->takeover_ready_);
              if (this->takeover_ready_) {
                this->publish_debug_("Official app connected: " + identifier);
              } else {
                this->publish_debug_("Official app waiting for UART idle: " + identifier);
              }
            }
          }

          void append_frame_(std::string &frame_buffer, char byte, TextSensor *sensor) {
            frame_buffer.push_back(byte);
            if (byte == '&' || frame_buffer.size() >= 160) {
              sensor->publish_state(frame_buffer);
              frame_buffer.clear();
            }
          }

          void on_uart_byte_(UARTDirection direction, uint8_t byte) {
            if (this->client_socket_ == nullptr || !this->takeover_ready_) {
              return;
            }

            char as_char = static_cast<char>(byte);
            if (direction == UART_DIRECTION_RX) {
              this->pending_rx_bytes_.push_back(byte);
              this->append_frame_(this->rx_frame_buffer_, as_char, this->debug_rx_);
            } else if (direction == UART_DIRECTION_TX) {
              this->append_frame_(this->tx_frame_buffer_, as_char, this->debug_tx_);
            }
          }

          void flush_uart_rx_to_client_() {
            if (this->client_socket_ == nullptr || this->pending_rx_offset_ >= this->pending_rx_bytes_.size()) {
              if (this->pending_rx_offset_ >= this->pending_rx_bytes_.size()) {
                this->pending_rx_bytes_.clear();
                this->pending_rx_offset_ = 0;
              }
              return;
            }

            while (this->pending_rx_offset_ < this->pending_rx_bytes_.size()) {
              ssize_t written = this->client_socket_->write(this->pending_rx_bytes_.data() + this->pending_rx_offset_,
                                                            this->pending_rx_bytes_.size() - this->pending_rx_offset_);
              if (written > 0) {
                this->pending_rx_offset_ += written;
                continue;
              }
              if (written == 0 || errno == ECONNRESET) {
                this->close_client_("Official app disconnected");
                return;
              }
              if (errno == EWOULDBLOCK || errno == EAGAIN) {
                return;
              }
              this->close_client_("Official app write failed");
              return;
            }

            this->pending_rx_bytes_.clear();
            this->pending_rx_offset_ = 0;
          }

          void read_client_to_uart_() {
            if (this->client_socket_ == nullptr || !this->client_socket_->ready()) {
              return;
            }

            uint8_t buf[128];
            while (true) {
              ssize_t read = this->client_socket_->read(buf, sizeof(buf));
              if (read > 0) {
                this->uart_->write_array(buf, read);
                continue;
              }
              if (read == 0 || errno == ECONNRESET) {
                this->close_client_("Official app disconnected");
                return;
              }
              if (errno == EWOULDBLOCK || errno == EAGAIN) {
                return;
              }
              this->close_client_("Official app read failed");
              return;
            }
          }
        };

        static DuepiExpertTcpBridge bridge(id(uart_bus), id(debug), id(debug_tx), id(debug_rx),
                                           id(expert_tcp_bridge_connected_bs), &id(uart_send),
                                           &id(expert_bridge_client_connected), &id(expert_bridge_takeover_active));

        bridge.set_enabled(id(expert_bridge_mode_requested));
        bridge.loop();
