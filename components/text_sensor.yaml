text:
  - platform: template
    name: "Debug raw protocol"
    id: debug_raw_payload_input
    entity_category: config
    disabled_by_default: true
    internal: true
    mode: TEXT
    optimistic: true
    update_interval: 10s
    set_action:
      - if:
          condition:
            lambda: 'return !id(expert_bridge_client_connected);'
          then:
            - wait_until:
                condition:
                  lambda: 'return (id(uart_send) == 0);'
                timeout: 1s
            - lambda: id(uart_send) = 10;
            - script.execute:
                id: UART_RAW_CMD
                payload_in: !lambda return x;
            - script.wait: UART_RAW_CMD
            - wait_until:
                condition:
                  lambda: 'return (id(uart_send) == 0);'
                timeout: 100ms
          else:
            - lambda: |-
                id(debug).publish_state("Official app connected: raw payload refused");
